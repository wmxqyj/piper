# 手眼标定配置文件

# 棋盘格参数（请根据实际棋盘格修改）
chessboard:
  pattern_size: [11, 8]          # 内角点数 (宽, 高)
  square_size_mm: 10.0           # 每个方格边长 (毫米)

# 相机参数
camera:
  type: "orbbec"                 # orbbec | realsense
  resolution:
    width: 640
    height: 480
  fps: 15
  depth_scale: 0.001
  align_depth: true
  log_level: "WARNING"

# 机械臂参数
robot:
  can_channel: "can_piper_r"    # CAN 通道
  arm_model: "piper"            # 机械臂型号
  firmware_version: "default"   # 固件版本
  joint_nums: 6                 # 关节数量

# 数据采集参数
data_collection:
  num_target: 15                # 目标采集点数
  save_dir: "calibration_data"  # 数据保存目录（相对于工作目录或绝对路径）

# 求解器参数
solver:
  algorithm: "tsai_lenz"        # tsai_lenz | park
