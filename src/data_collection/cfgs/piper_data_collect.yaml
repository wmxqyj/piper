# Piper 双臂主从数据采集配置文件

# 机械臂配置
piper:
  leader_can: "can_piper_l"  # 主臂 CAN 通道
  follower_can: "can_piper_r"  # 从臂 CAN 通道
  arm_model: "piper"  # 机械臂型号
  firmware_version: "default"  # 固件版本
  control_frequency: 50  # 控制频率 Hz
  joint_nums: 6  # 关节数量

# 手眼标定配置
calibration:
  result_path: "../../visual_servo/calibration_data/calib_data_20260707_181218/calibration_result.yaml"

# 末端执行器配置
effector:
  type: "agx_gripper"  # 夹爪类型
  enabled: true  # 是否启用夹爪跟随

# 相机配置
camera:
  type: "orbbec"  # 相机类型
  resolution:
    width: 640
    height: 480
  fps: 30  # 帧率
  depth_scale: 0.001  # 深度比例因子
  align_depth: true  # 是否对齐深度到彩色
  log_level: "WARNING"  # Orbbec SDK 日志级别: DEBUG, INFO, WARNING, ERROR, NONE

# 录制配置
recording:
  frequency: 10  # 录制频率 Hz
  buffer_size: 1000  # 缓冲区大小
  auto_start: false  # 是否自动开始录制

# 任务配置列表（包含任务名称和语言指令）
# 录制时直接从列表中选择任务，不需要手动输入语言指令
tasks:
  - name: "pick_up"
    descriptions: ["pick up the tube"]   
    episode_start: 0
    
  - name: "push_button"
    descriptions: ["push the blue button"]
    episode_start: 0
    
  - name: "slide_block"
    descriptions: ["slide the block to the left"]
    episode_start: 0
    
  - name: "open_drawer"
    descriptions: ["open the drawer"]
    episode_start: 0

# 数据保存配置
demo:
  save_path: "/home/siat/qyj/program/pyAgxArm/data"  # 保存路径
  variation: 0  # variation 编号
  random_seed: 42  # 随机种子

# 交互配置
interaction:
  ask_to_save: true  # 是否询问保存
  show_preview: false  # 是否显示预览
  key_start: "s"  # 开始录制按键
  key_stop: "q"  # 停止录制按键
  key_save: "y"  # 保存按键
  key_discard: "n"  # 丢弃按键

# RLBench 格式配置（6关节版本）
rlbench:
  joint_nums: 6  # 关节数量
  camera_names: ["front"]  # 相机名称列表
  misc_keys:  # misc 中需要保存的键
    - "front_camera_intrinsics"
    - "front_camera_extrinsics"
    - "front_camera_near"
    - "front_camera_far"
    - "keypoint_idxs"